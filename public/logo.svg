<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 76" fill="none" role="img" aria-label="The Groove Media — Production House">
  <!-- Gold film-strip emblem -->
  <g transform="rotate(-28 38 38)">
    <rect x="10" y="26" width="56" height="26" rx="4" fill="#f0bb24"/>
    <g fill="#0f4530">
      <rect x="15" y="30.5" width="5" height="5" rx="1"/>
      <rect x="24" y="30.5" width="5" height="5" rx="1"/>
      <rect x="33" y="30.5" width="5" height="5" rx="1"/>
      <rect x="42" y="30.5" width="5" height="5" rx="1"/>
      <rect x="51" y="30.5" width="5" height="5" rx="1"/>
      <rect x="15" y="42.5" width="5" height="5" rx="1"/>
      <rect x="24" y="42.5" width="5" height="5" rx="1"/>
      <rect x="33" y="42.5" width="5" height="5" rx="1"/>
      <rect x="42" y="42.5" width="5" height="5" rx="1"/>
      <rect x="51" y="42.5" width="5" height="5" rx="1"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="84" y="34" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="25" font-weight="800" letter-spacing="-0.5" fill="#FAF7F0">the <tspan fill="#f7cd47">groove</tspan> media</text>
  <text x="85" y="55" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="10.5" font-weight="600" letter-spacing="6" fill="#f0bb24">PRODUCTION HOUSE</text>
</svg>
