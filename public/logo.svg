<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 560" fill="none" role="img" aria-label="The Groove Media — Production House">
  <defs>
    <linearGradient id="gmGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="0.45" stop-color="#e9b425"/>
      <stop offset="1" stop-color="#9a6a10"/>
    </linearGradient>
  </defs>

  <!-- Gold film-strip swoosh (top strip + descending strip) -->
  <g>
    <g transform="rotate(-26 360 250)">
      <rect x="250" y="206" width="240" height="74" rx="6" fill="url(#gmGold)"/>
      <g fill="#0a0a0a">
        <rect x="266" y="216" width="15" height="15" rx="2"/>
        <rect x="298" y="216" width="15" height="15" rx="2"/>
        <rect x="330" y="216" width="15" height="15" rx="2"/>
        <rect x="362" y="216" width="15" height="15" rx="2"/>
        <rect x="394" y="216" width="15" height="15" rx="2"/>
        <rect x="426" y="216" width="15" height="15" rx="2"/>
        <rect x="458" y="216" width="15" height="15" rx="2"/>
        <rect x="266" y="255" width="15" height="15" rx="2"/>
        <rect x="298" y="255" width="15" height="15" rx="2"/>
        <rect x="330" y="255" width="15" height="15" rx="2"/>
        <rect x="362" y="255" width="15" height="15" rx="2"/>
        <rect x="394" y="255" width="15" height="15" rx="2"/>
        <rect x="426" y="255" width="15" height="15" rx="2"/>
        <rect x="458" y="255" width="15" height="15" rx="2"/>
      </g>
    </g>
    <g transform="rotate(64 408 330)">
      <rect x="320" y="300" width="176" height="64" rx="6" fill="url(#gmGold)"/>
      <g fill="#0a0a0a">
        <rect x="334" y="309" width="13" height="13" rx="2"/>
        <rect x="362" y="309" width="13" height="13" rx="2"/>
        <rect x="390" y="309" width="13" height="13" rx="2"/>
        <rect x="418" y="309" width="13" height="13" rx="2"/>
        <rect x="446" y="309" width="13" height="13" rx="2"/>
        <rect x="334" y="342" width="13" height="13" rx="2"/>
        <rect x="362" y="342" width="13" height="13" rx="2"/>
        <rect x="390" y="342" width="13" height="13" rx="2"/>
        <rect x="418" y="342" width="13" height="13" rx="2"/>
        <rect x="446" y="342" width="13" height="13" rx="2"/>
      </g>
    </g>
  </g>

  <!-- Stacked wordmark -->
  <g fill="#FFFFFF" font-family="'Arial Narrow','Helvetica Neue Condensed',Oswald,Impact,sans-serif" font-weight="800" text-anchor="middle">
    <text x="250" y="245" font-size="124">the</text>
    <text x="250" y="358" font-size="124">groove</text>
    <text x="250" y="471" font-size="124">media</text>
  </g>
  <text x="252" y="528" fill="#FFFFFF" font-family="'Arial Narrow','Helvetica Neue',Arial,sans-serif" font-size="31" font-weight="600" letter-spacing="13" text-anchor="middle">PRODUCTION HOUSE</text>
</svg>
