    <rect x="9" y="22" width="46" height="20" rx="3" fill="url(#gold)"/>
    <g fill="#082b1d">
      <rect x="12.5" y="24.5" width="4" height="4" rx="0.8"/>
      <rect x="20.5" y="24.5" width="4" height="4" rx="0.8"/>
      <rect x="28.5" y="24.5" width="4" height="4" rx="0.8"/>
      <rect x="36.5" y="24.5" width="4" height="4" rx="0.8"/>
      <rect x="44.5" y="24.5" width="4" height="4" rx="0.8"/>
      <rect x="12.5" y="35.5" width="4" height="4" rx="0.8"/>
      <rect x="20.5" y="35.5" width="4" height="4" rx="0.8"/>
      <rect x="28.5" y="35.5" width="4" height="4" rx="0.8"/>
      <rect x="36.5" y="35.5" width="4" height="4" rx="0.8"/>
      <rect x="44.5" y="35.5" width="4" height="4" rx="0.8"/>
    </g>
  </g>

  <!-- White play mark -->
  <circle cx="32" cy="32" r="12.5" fill="#faf7f0"/>
  <path d="M28 26.2 L41 32 L28 37.8 Z" fill="#082b1d"/>
</svg>
